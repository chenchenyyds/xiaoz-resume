name: Backend Tests

on:
  push:
    branches: [main, master, develop]
    paths:
      - "代码/backend/**"
      - "代码/db/**"
      - ".github/workflows/backend-test.yml"
  pull_request:
    branches: [main, master, develop]
    paths:
      - "代码/backend/**"
      - "代码/db/**"

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11"]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: xiaoz
          POSTGRES_PASSWORD: xiaoz_pwd
          POSTGRES_DB: xiaoz_resume_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: 代码/backend/requirements.txt

      - name: 安装系统依赖(docx 解析需要)
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt1-dev

      - name: 装 Python 依赖
        working-directory: 代码/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 初始化测试 DB
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: xiaoz
          DB_PASSWORD: xiaoz_pwd
          DB_NAME: xiaoz_resume_test
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          JWT_SECRET_KEY: test-secret
          APP_ENV: test
          APP_DEBUG: "false"
          DEEPSEEK_API_KEY: sk-test-fake
        working-directory: 代码
        run: |
          PGPASSWORD=xiaoz_pwd psql -h localhost -U xiaoz -d xiaoz_resume_test -f db/01_schema.sql || true
          PGPASSWORD=xiaoz_pwd psql -h localhost -U xiaoz -d xiaoz_resume_test -f db/02_seed.sql || true

      - name: 跑 pytest
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: xiaoz
          DB_PASSWORD: xiaoz_pwd
          DB_NAME: xiaoz_resume_test
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          JWT_SECRET_KEY: test-secret
          APP_ENV: test
          APP_DEBUG: "false"
          DEEPSEEK_API_KEY: sk-test-fake
          # 测试模式:跳过真实 LLM/支付/短信/OSS 调用
          SMS_DEV_MODE: "true"
          HUPIIJIAO_MERCHANT_ID: test
          HUPIIJIAO_MERCHANT_KEY: test
        working-directory: 代码/backend
        run: |
          pytest tests/ -v --tb=short --maxfail=3

      - name: 上传覆盖率
        if: matrix.python-version == '3.11' && github.event_name == 'push'
        working-directory: 代码/backend
        run: |
          pip install coverage
          coverage run -m pytest tests/ -q
          coverage report
          coverage xml
      - name: Codecov
        if: matrix.python-version == '3.11' && github.event_name == 'push'
        uses: codecov/codecov-action@v4
        with:
          file: 代码/backend/coverage.xml
          flags: backend
          fail_ci_if_error: false
