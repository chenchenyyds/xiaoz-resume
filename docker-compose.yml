version: "3.8"

# V1 单机部署:PostgreSQL + Redis + 后端 + (前端可加 nginx)

services:
  db:
    image: postgres:15-alpine
    container_name: xiaoz-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: xiaoz
      POSTGRES_PASSWORD: xiaoz_pwd
      POSTGRES_DB: xiaoz_resume
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xiaoz -d xiaoz_resume"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: xiaoz-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: xiaoz-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://xiaoz:xiaoz_pwd@db:5432/xiaoz_resume
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # 前端用户端(开发模式)
  frontend-user:
    image: node:20-alpine
    container_name: xiaoz-frontend-user
    working_dir: /app
    volumes:
      - ./frontend-user:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"

  # 前端后台(开发模式)
  frontend-admin:
    image: node:20-alpine
    container_name: xiaoz-frontend-admin
    working_dir: /app
    volumes:
      - ./frontend-admin:/app
    ports:
      - "5174:5173"
    command: sh -c "npm install && npm run dev -- --host"

  # nginx 反向代理(生产模式)
  nginx:
    image: nginx:alpine
    container_name: xiaoz-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

volumes:
  pgdata:
