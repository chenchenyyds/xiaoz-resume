<?xml version="1.0" encoding="UTF-8"?>
<!--
  小Z简历 - 推广海报 (正方形 800x800)
  用途:朋友圈/小红书/微博/微信群分享
  导出:用浏览器打开这个文件,F12 截图,或用在线 SVG-to-PNG 工具
  配色:科技蓝 #1E88E5 + 暖橙 #FF6B35 + 留白
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E88E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F4511E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="800" fill="url(#bg)"/>

  <!-- 装饰圆 -->
  <circle cx="100" cy="100" r="150" fill="white" opacity="0.05"/>
  <circle cx="700" cy="700" r="200" fill="white" opacity="0.05"/>

  <!-- 顶部品牌 -->
  <text x="400" y="80" text-anchor="middle" fill="white" font-family="-apple-system, sans-serif" font-size="24" font-weight="600" opacity="0.9">📄 小Z简历</text>

  <!-- 主标题 -->
  <text x="400" y="220" text-anchor="middle" fill="white" font-family="-apple-system, sans-serif" font-size="72" font-weight="800">AI 帮你改简历</text>

  <!-- 副标题 -->
  <text x="400" y="290" text-anchor="middle" fill="white" font-family="-apple-system, sans-serif" font-size="32" font-weight="400" opacity="0.9">3 分钟,让 HR 多看你一眼</text>

  <!-- 痛点 -->
  <g transform="translate(150, 350)">
    <rect width="500" height="60" rx="30" fill="white" opacity="0.15"/>
    <text x="250" y="40" text-anchor="middle" fill="white" font-family="-apple-system, sans-serif" font-size="24">❌ 投 100 份,0 面试?</text>
  </g>
  <g transform="translate(150, 425)">
    <rect width="500" height="60" rx="30" fill="white" opacity="0.15"/>
    <text x="250" y="40" text-anchor="middle" fill="white" font-family="-apple-system, sans-serif" font-size="24">❌ 工作 3 年,简历写不出亮点?</text>
  </g>
  <g transform="translate(150, 500)">
    <rect width="500" height="60" rx="30" fill="white" opacity="0.15"/>
    <text x="250" y="40" text-anchor="middle" fill="white" font-family="-apple-system, sans-serif" font-size="24">❌ 不会包装,HR 30 秒就刷掉?</text>
  </g>

  <!-- CTA 徽章 -->
  <g transform="translate(250, 600)">
    <rect width="300" height="80" rx="40" fill="url(#badge)"/>
    <text x="150" y="50" text-anchor="middle" fill="white" font-family="-apple-system, sans-serif" font-size="30" font-weight="700">9.9 元 改 1 份</text>
  </g>

  <!-- 价格详情 -->
  <text x="400" y="710" text-anchor="middle" fill="white" font-family="-apple-system, sans-serif" font-size="22" opacity="0.9">🎁 注册即送 50 积分(可免费试改)</text>
  <text x="400" y="745" text-anchor="middle" fill="white" font-family="-apple-system, sans-serif" font-size="20" opacity="0.7">基于 DeepSeek-V3 · 3 秒生成 · STAR 法则</text>
</svg>
