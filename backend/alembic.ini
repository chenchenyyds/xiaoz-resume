# Alembic 配置文件
# 小Z简历 - V2 数据库迁移
# 用法:alembic upgrade head  (应用所有迁移)
#      alembic revision --autogenerate -m "add xxx"  (自动生成新迁移)
#      alembic downgrade -1  (回退一个版本)

[alembic]
# 迁移脚本目录
script_location = alembic

# 模板文件
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# 时间戳分隔符(用 _ 而不是 :)
truncate_slug_length = 40

# 每次执行前是否允许生成新迁移
revision_environment = false

# SQLAlchemy URL - 通过 env.py 从环境变量读取(不要在这里写明文)
sqlalchemy.url =

# 输出 - 控制台彩色
output_encoding = utf-8

[post_write_hooks]
# 提交前自动格式化(可选)
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
