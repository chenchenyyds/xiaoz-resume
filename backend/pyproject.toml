# ============================================================
# 小Z简历 - Ruff 配置
# ============================================================
# 初版(V1)临时把 F401/F841/F541/E712 降为非阻塞,
# 这几条是开发累积的 noise(unused import、未用变量、空 f-string、
# == False 写法),不是 bug,不影响功能。
#
# 后续 follow-up commit 里:
#   1) 跑 ruff check --fix 一次性 auto-fix F401/F541/E712
#   2) 手动清理 F841(删未用变量或加 noqa)
#   3) 从下方 ignore 列表移除对应规则
#
# 当前保留的硬性规则:
#   - E9xx  语法错
#   - F63/F7/F82  引用/字面量/名字解析错
#   - F821  undefined name
# ============================================================

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
# 只查真正的语法/引用类错
select = [
    "E9",   # 语法错
    "F63",  # 字符串字面量错
    "F7",   # 未定义/不可达等
    "F82",  # 未定义 name
]
# 暂不查(开发债,后续清理)
ignore = [
    "F401",  # imported but unused
    "F841",  # local variable assigned but never used
    "F541",  # f-string without any placeholders
    "E712",  # == False / == True
]

[tool.ruff.lint.per-file-ignores]
# 测试文件允许 assert 未使用返回值等宽松规则
"tests/*" = ["F841", "E712"]
"scripts/*" = ["F401", "F841", "F541", "E712"]
